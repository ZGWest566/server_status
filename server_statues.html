<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Iron Handle 状态页</title>
    <style>
        /* 全局样式 - 清爽暗色风格 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            padding: 20px;
        }
        .card {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 40px 48px;
            max-width: 560px;
            width: 100%;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: transform 0.3s ease;
            text-align: center;
        }
        .card:hover {
            transform: translateY(-4px);
        }
        .server-icon {
            font-size: 64px;
            margin-bottom: 8px;
            display: block;
        }
        .server-name {
            color: #fff;
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 6px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }
        .server-ip {
            color: rgba(255, 255, 255, 0.5);
            font-size: 16px;
            font-weight: 400;
            margin-bottom: 24px;
            word-break: break-all;
        }
        .status-badge {
            display: inline-block;
            padding: 8px 24px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 18px;
            background: rgba(255, 255, 255, 0.08);
            color: #aaa;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }
        .status-badge.online {
            background: rgba(0, 230, 118, 0.15);
            color: #69db7c;
            border-color: rgba(0, 230, 118, 0.25);
            box-shadow: 0 0 20px rgba(0, 230, 118, 0.08);
        }
        .status-badge.offline {
            background: rgba(255, 82, 82, 0.12);
            color: #ff6b6b;
            border-color: rgba(255, 82, 82, 0.2);
        }
        .status-dot {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 10px;
            vertical-align: middle;
            background: #555;
        }
        .online .status-dot {
            background: #69db7c;
            box-shadow: 0 0 12px rgba(0, 230, 118, 0.5);
        }
        .offline .status-dot {
            background: #ff6b6b;
            box-shadow: 0 0 12px rgba(255, 82, 82, 0.4);
        }
        .players-box {
            background: rgba(255, 255, 255, 0.04);
            border-radius: 20px;
            padding: 20px;
            margin-top: 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .players-number {
            font-size: 40px;
            font-weight: 700;
            color: #fff;
            line-height: 1.2;
        }
        .players-label {
            color: rgba(255, 255, 255, 0.5);
            font-size: 16px;
            letter-spacing: 2px;
            margin-top: 2px;
        }
        .motd {
            margin-top: 18px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 15px;
            background: rgba(0, 0, 0, 0.2);
            padding: 12px 18px;
            border-radius: 16px;
            font-style: italic;
            word-break: break-word;
            min-height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .motd span {
            color: #ffd93d;
            font-style: normal;
        }
        .footer {
            margin-top: 24px;
            color: rgba(255, 255, 255, 0.2);
            font-size: 13px;
            letter-spacing: 1px;
        }
        .loader {
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid #69db7c;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            animation: spin 0.9s linear infinite;
            margin: 8px auto 0;
            display: none;
        }
        .loader.active {
            display: block;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        /* 移动端适配 */
        @media (max-width: 480px) {
            .card {
                padding: 28px 20px;
            }
            .server-name {
                font-size: 22px;
            }
            .players-number {
                font-size: 32px;
            }
        }
    </style>
</head>
<body>

<div class="card">
    <!-- 服务器图标（可换成你自己的） -->
    <span class="server-icon">⛏️</span>

    <!-- 服务器名称（修改这里） -->
    <div class="server-name">Iron Handle</div>

    <!-- 服务器地址（修改这里） -->
    <div class="server-ip" id="serverAddress">8daae90eea6a.ofalias.com:36119</div>

    <!-- 状态徽章 -->
    <div class="status-badge offline" id="statusBadge">
        <span class="status-dot"></span>
        <span id="statusText">查询中...</span>
    </div>

    <!-- 玩家数量 -->
    <div class="players-box">
        <div class="players-number" id="playerCount">--</div>
        <div class="players-label">当前在线</div>
    </div>

    <!-- MOTD（游戏内欢迎消息） -->
    <div class="motd" id="motdDisplay">⏳ 正在获取服务器信息...</div>

    <!-- 加载动画（仅查询时显示） -->
    <div class="loader" id="loader"></div>

    <div class="footer">🔄 实时数据 · 每60秒更新</div>
</div>

<script>
    (function() {
        // ---- 在这里修改你的服务器地址（域名或IP，不要加端口，除非默认非25565） ----
        const SERVER_ADDRESS = '8daae90eea6a.ofalias.com:36119';   // 例如 'play.hypixel.net' 或 '192.168.1.100'
        // 如果你的服务器端口不是 25565，请把端口加上，如 'mc.example.com:25566'
        // 但大部分API默认使用25565，如果非标准端口，需要额外处理（见下方API URL）

        // ---- API 选择：使用 mcsrvstat.us（稳定，免费，无需密钥） ----
        // 注意：如果服务器端口不是25565，需要在地址后加 :端口，例如 'mc.example.com:25566'
        // 如果你没有改端口，直接使用 SERVER_ADDRESS 即可
        const API_URL = `https://api.mcsrvstat.us/2/${SERVER_ADDRESS}`;

        // DOM 元素
        const statusBadge = document.getElementById('statusBadge');
        const statusText = document.getElementById('statusText');
        const playerCount = document.getElementById('playerCount');
        const motdDisplay = document.getElementById('motdDisplay');
        const loader = document.getElementById('loader');
        const serverAddressDisplay = document.getElementById('serverAddress');

        // 显示服务器地址（用于展示）
        serverAddressDisplay.textContent = SERVER_ADDRESS;

        // 更新状态函数
        async function fetchServerStatus() {
            // 显示加载动画
            loader.classList.add('active');

            try {
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error(`HTTP error ${response.status}`);
                const data = await response.json();

                // 判断在线状态 (mcsrvstat 返回 online: true/false)
                const isOnline = data.online === true;

                // 更新状态徽章
                statusBadge.className = 'status-badge' + (isOnline ? ' online' : ' offline');
                statusText.textContent = isOnline ? '服务器在线' : '服务器离线';

                // 更新玩家数量
                if (isOnline && data.players && typeof data.players.online === 'number') {
                    playerCount.textContent = data.players.online;
                } else {
                    playerCount.textContent = '--';
                }

                // 更新 MOTD（如果有）
                if (isOnline && data.motd && data.motd.clean && data.motd.clean.length > 0) {
                    // 取第一行，也可以合并所有行
                    const motdLines = data.motd.clean.join(' ');
                    motdDisplay.innerHTML = `📢 ${motdLines}`;
                } else if (isOnline) {
                    motdDisplay.textContent = '✨ 服务器已开启，但没有 MOTD 信息';
                } else {
                    motdDisplay.textContent = '⚠️ 服务器目前无法连接，请稍后再试';
                }

            } catch (error) {
                console.error('获取服务器状态失败:', error);
                // 显示错误状态
                statusBadge.className = 'status-badge offline';
                statusText.textContent = '查询失败';
                playerCount.textContent = '?';
                motdDisplay.textContent = '❌ 无法获取服务器信息，请检查地址或网络';
            } finally {
                loader.classList.remove('active');
            }
        }

        // 初次加载立即查询
        fetchServerStatus();

        // 每 60 秒自动刷新一次
        setInterval(fetchServerStatus, 60000);
    })();
</script>

</body>
</html>
